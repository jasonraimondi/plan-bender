version: 2

builds:
  - main: ./cmd/plan-bender
    binary: plan-bender
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - cmd: cp {{ .Path }} {{ dir .Path }}/pb{{ if eq .Os "windows" }}.exe{{ end }}
          output: true

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: jasonraimondi
      name: homebrew-tap
    homepage: https://github.com/jasonraimondi/plan-bender
    description: Plan management CLI tool
    install: |
      bin.install "plan-bender"
      bin.install_symlink "plan-bender", "pb"
    test: |
      system "#{bin}/plan-bender", "--version"
