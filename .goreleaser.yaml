version: 2

builds:
  - id: plan-bender
    main: ./cmd/plan-bender
    binary: plan-bender
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - cmd: cp {{ .Path }} {{ dir .Path }}/pb{{ if eq .Os "windows" }}.exe{{ end }}
          output: true

  - id: plan-bender-agent
    main: ./cmd/plan-bender-agent
    binary: plan-bender-agent
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    hooks:
      post:
        - cmd: cp {{ .Path }} {{ dir .Path }}/pba{{ if eq .Os "windows" }}.exe{{ end }}
          output: true

archives:
  - ids: [plan-bender]
    format: tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - src: "dist/plan-bender-agent_{{ .Os }}_{{ .Arch }}*/plan-bender-agent{{ if eq .Os \"windows\" }}.exe{{ end }}"
        dst: .
        strip_parent: true
  - ids: [plan-bender-agent]
    format: tar.gz
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

