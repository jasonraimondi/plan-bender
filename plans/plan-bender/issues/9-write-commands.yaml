outcome: |
  CLI commands that validate YAML before writing PRD and issue files, serving as the single write path for generated skills.

scope: |
  write-prd and write-issue commands. Read from stdin or file arg, validate, write. No backend sync — that's the sync command.

acceptance_criteria:
  - "plan-bender write-prd {slug} reads YAML from stdin, validates against PRD schema, writes to {plans_dir}/{slug}/prd.yaml"
  - "plan-bender write-issue {slug} {id} reads YAML from stdin, validates against issue schema (including custom fields), writes to {plans_dir}/{slug}/issues/{id}-{issue-slug}.yaml"
  - "Validation failures print errors and exit 1 without writing"
  - "Creates plan directory and issues/ subdirectory if they don't exist"
  - "File arg alternative: plan-bender write-issue {slug} {id} --file path/to/issue.yaml"

steps:
  - "src/cli/commands/write-prd.ts — read YAML from stdin or --file, parse, validate via schemas/validate, resolve output path from config.plans_dir + slug, write file"
  - "src/cli/commands/write-issue.ts — read YAML from stdin or --file, parse, validate via schemas/validate (including custom fields), derive filename from id + slug, write to issues/ subdir"
  - "Shared write utility — ensure directory exists, atomic write (write to temp then rename), report success with file path"
  - "Register both commands in CLI entry point"

use_cases:
  - UC-3

notes: |
  Generated skills pipe YAML through these commands instead of writing files directly. This ensures every write is validated.
