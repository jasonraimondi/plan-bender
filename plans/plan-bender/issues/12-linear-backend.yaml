outcome: |
  A TrackingBackend implementation that syncs plan state with Linear via the official SDK.

scope: |
  Linear SDK integration, status mapping, issue CRUD, PR attachment. No CLI command — consumed by sync command.

acceptance_criteria:
  - "Implements TrackingBackend interface"
  - "LinearClient initialized from config.linear.api_key"
  - "createIssue maps YAML fields to Linear issue (title, description, state, team, labels)"
  - "updateIssue pushes status/field changes to Linear"
  - "pullIssue reads Linear issue state and maps back to YAML fields"
  - "Workflow states map correctly between local names and Linear status names"
  - "PR URLs are attached to Linear issues via attachmentCreate"

steps:
  - "src/backends/linear.ts — LinearClient initialization from config.linear.api_key"
  - "Status mapping — bidirectional map between config.workflow_states and Linear statuses, configurable in config.linear.status_map"
  - "createIssue — map YAML fields to Linear createIssue input (teamId from config.linear.team, state from status map)"
  - "updateIssue — map changed YAML fields to Linear updateIssue input, write linear_id back to local YAML"
  - "pullIssue — read Linear issue by linear_id, map fields back to local YAML structure"
  - "attachPR — create Linear attachment with PR URL and title"
  - "Register linear in backend factory"

use_cases:
  - UC-4

notes: |
  Linear SDK handles auth, pagination, and retries. The adapter is pure I/O translation — no business logic. Status mapping should be configurable since Linear workspace statuses vary.
