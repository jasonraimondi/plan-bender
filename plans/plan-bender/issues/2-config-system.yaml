outcome: |
  A config system that loads, validates, and deep-merges plan-bender.yaml from three layers: global defaults, project config, and local overrides.

scope: |
  Config TypeScript types, YAML loading, three-layer merge, validation, default values. No CLI command — consumed by other modules.

acceptance_criteria:
  - "Loads ~/.config/plan-bender/defaults.yaml as base layer"
  - "Loads ./plan-bender.yaml as project layer, deep-merges over global"
  - "Loads ./plan-bender.local.yaml as local layer, deep-merges over project"
  - "Arrays replace (not append) during merge"
  - "Missing config files are silently skipped (not errors)"
  - "Invalid config values produce clear validation errors with field paths"
  - "All config fields have sensible defaults"

steps:
  - "src/config/schema.ts — TypeScript types for full config: backend, tracks[], workflow_states[], step_pattern, plans_dir, max_points, pipeline.skip[], issue_schema.custom_fields, linear.api_key/team/project_id"
  - "src/config/defaults.ts — default config values: backend=yaml-fs, tracks=[intent,experience,data,rules,resilience], states=[backlog,todo,in-progress,blocked,in-review,qa,done,canceled], step_pattern='Target — behavior', plans_dir=./plans/, max_points=3"
  - "src/config/loader.ts — loadConfig(projectRoot): read YAML from three paths, parse, return raw objects"
  - "src/config/merge.ts — deepMerge(global, project, local): recursive merge with array-replace semantics"
  - "src/config/validate.ts — validateConfig(merged): check types, required fields, enum constraints, custom_fields structure"
  - "src/config/index.ts — resolveConfig(projectRoot): load → merge → validate → return typed Config"

use_cases:
  - UC-1
  - UC-6
  - UC-10

notes: |
  Deep merge array behavior: replace, not append. If project sets tracks: [frontend, backend], it replaces the global default entirely. This matches standard YAML config conventions.
