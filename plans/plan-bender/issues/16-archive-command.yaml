outcome: |
  A CLI command that archives completed plans by moving them to a .archive/ subdirectory with a summary.

scope: |
  Move plan directory, generate summary file. No backend sync on archive.

acceptance_criteria:
  - "plan-bender archive {slug} moves {plans_dir}/{slug}/ to {plans_dir}/.archive/{slug}/"
  - "Generates a summary.md in the archived directory with: completion date, point totals, issue count by status"
  - "Prompts for confirmation before archiving (--force skips prompt)"
  - "Refuses to archive plans with in-progress or blocked issues (--force overrides)"

steps:
  - "src/cli/commands/archive.ts — resolve plan path, check for active issues (in-progress/blocked), prompt confirmation"
  - "Summary generation — read all issues, compute stats (points done/total, issues by status, completion date), write summary.md"
  - "Move directory — rename {plans_dir}/{slug}/ to {plans_dir}/.archive/{slug}/"
  - "Register archive command in CLI entry point"

use_cases:
  - UC-9

notes: |
  Archiving is a local-only operation. Does not update Linear or other backends.
