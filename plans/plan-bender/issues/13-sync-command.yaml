outcome: |
  A CLI command that syncs plan state between local YAML and the configured tracking backend, supporting per-issue and whole-plan granularity in both push and pull directions.

scope: |
  sync command with push (default) and pull modes. Per-issue (plan-bender sync slug#id) and batch (plan-bender sync slug). No conflict resolution — last write wins.

acceptance_criteria:
  - "plan-bender sync {slug}#{id} pushes one issue to backend"
  - "plan-bender sync {slug} pushes all issues in plan to backend"
  - "plan-bender sync {slug} --pull pulls remote state to local YAML"
  - "New remote IDs (e.g., linear_id) are written back to local YAML after push"
  - "Sync summary reports: created, updated, unchanged counts"
  - "Missing backend config produces clear error (e.g., no linear.api_key)"

steps:
  - "src/cli/commands/sync.ts — parse args: slug, optional issue id, --pull flag"
  - "Push mode — load local YAML, call backend.createIssue (new) or backend.updateIssue (existing linear_id), write remote IDs back to local YAML"
  - "Pull mode — call backend.pullProject or backend.pullIssue, update local YAML fields from remote state"
  - "Batch orchestration — iterate all issues in plan, sync each, collect SyncResult, print summary"
  - "Register sync command in CLI entry point"

use_cases:
  - UC-4

notes: |
  Last-write-wins for conflicts. No merge logic. If local and remote both changed, the sync direction (push vs pull) determines which wins. This is intentional simplicity for v0.2.
