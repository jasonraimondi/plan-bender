outcome: |
  A buildable TypeScript CLI project with bin entry point, test runner, linter, and dev workflow.

scope: |
  Project init, toolchain config, CLI entry point with --version/--help. No commands beyond skeleton.

acceptance_criteria:
  - "pnpm build produces dist/cli.js that runs with --version and --help"
  - "pnpm test runs vitest with no failures"
  - "pnpm lint runs oxlint with no violations"
  - "package.json bin field maps plan-bender to dist/cli.js"

steps:
  - "package.json — pnpm init with type: module, name: plan-bender, bin: { plan-bender: ./dist/cli.js }, engines: { node: >=22 }"
  - "tsconfig.json — configure for TS 7 native preview, strict mode, ES2024 target, NodeNext module resolution"
  - "vite.config.ts — library mode build with src/cli/index.ts entry, ES format output, external node builtins"
  - "vitest.config.ts — basic setup with src alias, coverage provider"
  - "oxlint config — minimal defaults, no custom rules"
  - "src/cli/index.ts — CLI entry point using commander or citty, register --version from package.json, --help"
  - ".gitignore — add dist/, node_modules/, .plan-bender/"

use_cases:
  - UC-1

notes: |
  This is the foundation. Keep it minimal — just enough to build, test, lint, and run a CLI that prints version.
