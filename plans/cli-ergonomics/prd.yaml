name: "CLI Ergonomics Overhaul"
slug: cli-ergonomics
status: active
created: 2026-03-28
updated: 2026-03-28

description: |
  Reshape the pb CLI as agent plumbing — consistent args, validated writes, machine-readable output, and a README that points users to /bender-* skills as the primary interface.

why: |
  The CLI has inconsistent argument patterns (slug is a flag on write-issue but positional everywhere else), skills bypass CLI validation when writing YAML, generate-skills is an unnecessary standalone command, and the README presents CLI and skills as equals when skills are the real user interface. This creates confusion about the idiomatic way to use plan-bender.

outcome: |
  CLI is internally consistent (slug always positional), skills validate writes through the CLI, generate-skills is folded into install, all data commands support --json, shell completion works, and the README leads with /bender-orchestrator as the front door.

in_scope:
  - "Standardize write-prd and write-issue to take slug as first positional arg"
  - "Add --json flag to status, validate, and graph commands"
  - "Fold generate-skills into install (remove as top-level command)"
  - "Add shell completion command with slug auto-completion from plan dirs"
  - "Error on TTY stdin when no file argument given"
  - "Standardize all user-facing CLI messages to use pb instead of plan-bender"
  - "Fix README config file references to match actual dotfile names"
  - "Restructure README to lead with /bender-orchestrator, CLI in reference section"
  - "Update skill templates to pipe writes through pb write-prd / pb write-issue"

out_of_scope:
  - "Noun-verb subcommand restructuring (pb prd write, pb issue list)"
  - "--dry-run flag on write/sync commands"
  - "Graph output format options (--format dot, --open)"
  - "Splitting status into separate list and show commands"
  - "JSON-by-default or auto-detect output mode"
  - "Renaming write-prd/write-issue to create-prd/create-issue"

use_cases:
  - id: UC-1
    description: "Agent skill pipes generated YAML through pb write-prd <slug> and gets validation + atomic write in one step"
  - id: UC-2
    description: "Agent skill pipes generated YAML through pb write-issue <slug> and gets validation + atomic write in one step"
  - id: UC-3
    description: "Agent or human runs pb status --json <slug> and gets structured output for programmatic consumption"
  - id: UC-4
    description: "Human runs pb install and gets skills regenerated + symlinked in one command"
  - id: UC-5
    description: "Human types pb <tab> and gets command completion; pb status <tab> completes plan slugs"
  - id: UC-6
    description: "Human reads README and immediately understands: pb init then /bender-orchestrator"
  - id: UC-7
    description: "Human accidentally runs pb write-prd with no args on a terminal and gets a clear error instead of a hanging cursor"

decisions:
  - "Slug is always the first positional arg on write-prd and write-issue — CLI arg determines directory, YAML slug field is the internal name"
  - "generate-skills becomes an internal function called by install, not a user-facing command"
  - "Config files are .plan-bender.yaml and .plan-bender.local.yaml (dotfiles) — README will be corrected"
  - "CLI messages use pb; skill templates keep plan-bender (agents, not humans)"
  - "Human-readable output is the default; --json is opt-in"
  - "Breaking changes are acceptable — pre-1.0"

open_questions:
  - "Should init also be updated to reference .plan-bender.local.yaml when writing Linear secrets, rather than embedding them in the main config?"

risks:
  - "Skill template changes require regeneration — users on older generated skills won't get the write-through-CLI behavior until they run pb install"
  - "Changing write-issue from --slug flag to positional arg is a breaking change for any external scripts calling it"

validation:
  - "pb write-prd <slug> accepts stdin pipe and writes validated YAML to the correct directory"
  - "pb write-issue <slug> accepts stdin pipe and writes validated YAML to the correct directory"
  - "pb status --json outputs valid JSON"
  - "pb validate --json outputs valid JSON"
  - "pb graph --json outputs valid JSON"
  - "pb install regenerates skills before symlinking"
  - "pb write-prd with no args on a TTY exits with error and hint"
  - "pb completion bash/zsh/fish outputs valid completion scripts"
  - "Tab-completing pb status <tab> lists plan slugs"
  - "All existing tests pass after refactoring"

notes: |
  Modules affected: internal/cli (all command files), internal/template/embedded (8 skill templates), cmd/plan-bender/main.go (command registration), README.md.

  The generate-skills logic moves from being a standalone command to an internal function called by install. The NewGenerateSkillsCmd can be removed from main.go's AddCommand list. The generate.go file keeps its logic but exposes it as a callable function rather than only as a cobra command.

  Skill templates that write files (bender-write-a-prd, bender-prd-to-issues, bender-write-an-issue) need to be updated to pipe YAML through the CLI instead of writing directly. This is the highest-impact change for correctness.

  Testing strategy: unit tests for the changed CLI commands (write-prd, write-issue arg parsing, --json output, TTY detection, install-with-generate). Integration test for skill template rendering with new write-through-CLI instructions.

dev_command: "go test ./..."
base_url: null
