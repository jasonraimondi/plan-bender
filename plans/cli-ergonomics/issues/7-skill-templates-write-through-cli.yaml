outcome: |
  Skill templates instruct the agent to pipe YAML through plan-bender write-prd/write-issue instead of writing files directly, getting validation for free.

scope: |
  Three skill templates: bender-write-a-prd, bender-prd-to-issues, bender-write-an-issue. Template rendering tests. Does not change orchestrator or implement templates.

acceptance_criteria:
  - "bender-write-a-prd.skill.tmpl section 6 instructs agent to pipe YAML through plan-bender write-prd {slug}"
  - "bender-prd-to-issues.skill.tmpl section 6 instructs agent to pipe each issue through plan-bender write-issue {slug}"
  - "bender-write-an-issue.skill.tmpl section 6 instructs agent to pipe YAML through plan-bender write-issue {slug}"
  - "Template rendering tests pass and verify CLI command strings are present in rendered output"

steps:
  - "bender-write-a-prd.skill.tmpl section 6 — replace 'Create {{.plans_dir}}{slug}/prd.yaml using the drafted content' with instruction to write YAML content then run 'plan-bender write-prd {slug} <file>' for validated atomic write"
  - "bender-prd-to-issues.skill.tmpl section 6 — replace 'Create {{.plans_dir}}{slug}/issues/ and write one YAML file per approved slice' with instruction to write each issue then run 'plan-bender write-issue {slug} <file>' per issue"
  - "bender-write-an-issue.skill.tmpl section 6 — replace direct file write instructions with 'plan-bender write-issue {slug} <file>' for both plan-based and standalone issues"
  - "templates_test.go — add assertions that rendered bender-write-a-prd contains 'plan-bender write-prd' and bender-write-an-issue/bender-prd-to-issues contain 'plan-bender write-issue'"

use_cases:
  - UC-1
  - UC-2

notes: |
  Templates keep plan-bender (not pb) per the decision that skill templates use the full binary name. The agent writes YAML to a temp file then passes it as the file arg — cleaner than piping multi-line YAML through stdin in a skill instruction.
