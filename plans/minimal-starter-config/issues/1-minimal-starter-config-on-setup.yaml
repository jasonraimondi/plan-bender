outcome: |
  pb setup writes a .plan-bender.yaml with only plans_dir, max_points, and agents.
  Omitted fields resolve to built-in defaults at load time.

scope: |
  Add StarterConfig() to the config package, swap it in to setup.go, add omitempty
  to the two sub-struct slice fields on Config, and update the setup test.

acceptance_criteria:
  - "Generated file contains plans_dir, max_points, agents"
  - "Generated file does not contain tracks, workflow_states, pipeline, issue_schema"
  - "All config loader tests pass — missing fields still resolve to defaults"
  - "pb setup followed by any command works correctly"

steps:
  - "config/config.go PipelineConfig.Skip — add omitempty tag so empty slice is omitted when Config is serialized"
  - "config/config.go IssueSchemaConfig.CustomFields — add omitempty tag for same reason"
  - "config/defaults.go StarterConfig() — add function returning PartialConfig with only PlansDir, MaxPoints, Agents set"
  - "cli/setup.go runSetup — marshal config.StarterConfig() instead of config.Defaults() when writing the initial config file"
  - "cli/setup_test.go TestSetup_FirstRunWritesDefaults — assert tracks, workflow_states, pipeline, issue_schema are absent from the generated file"

use_cases:
  - UC-1
  - UC-2
  - UC-3

notes: |
  PartialConfig already has omitempty on all fields — marshaling StarterConfig() naturally
  omits nil pointers and nil slices. No custom serialization needed.
