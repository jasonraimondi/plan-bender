name: Plan-Bender Go Rewrite
slug: go-rewrite
status: draft
created: 2026-03-28
updated: 2026-03-28
description: Rewrite plan-bender from TypeScript to Go for single-binary distribution
why: >
  The current TypeScript implementation requires Node.js >= 22 as a runtime dependency.
  Users must npm install, manage node versions, and deal with dependency resolution.
  A Go rewrite produces a single static binary — download and run, no runtime needed.
outcome: >
  A feature-complete Go CLI binary (plan-bender / pb) that passes all existing
  validation and behavioral tests, reads/writes identical YAML plan schemas, and
  ships via goreleaser to GitHub Releases + Homebrew.

in_scope:
  - All 10 CLI commands (init, generate-skills, install, validate, write-prd, write-issue, status, graph, sync, archive)
  - Both backends (yaml-fs, linear) with identical TrackingBackend interface
  - 3-layer config loading via Viper (global, project, local)
  - Schema validation with go-playground/validator + custom cross-ref and cycle detection
  - Template system using Go text/template with embed.FS for bundled templates
  - Template override mechanism (.plan-bender/templates/)
  - Skill generation and symlink installation
  - Atomic file writes (tmp + rename)
  - Bubbletea + Lipgloss for interactive prompts and styled output
  - goreleaser for cross-platform builds (linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64)
  - Homebrew tap via separate jasonraimondi/homebrew-tap repo
  - Rewrite all 8 .skill.tmpl files to Go text/template syntax

out_of_scope:
  - Automated migration tool for custom .skill.tmpl files (old syntax to Go template syntax)
  - Changes to YAML plan schemas (PRD, issue formats stay identical)
  - New features beyond current TypeScript implementation
  - Plugin system or extensibility beyond template overrides
  - Web UI or API server mode

use_cases:
  - id: UC-1
    description: User installs plan-bender by downloading a single binary or via Homebrew — no Node.js required
  - id: UC-2
    description: User runs `pb init` to create .plan-bender.yaml and generate skills, same interactive flow as TS version
  - id: UC-3
    description: User validates, writes, and manages plans using identical YAML schemas — existing plans/ directories work unchanged
  - id: UC-4
    description: User syncs issues to Linear via raw GraphQL, same push/pull behavior as TS @linear/sdk integration
  - id: UC-5
    description: User customizes skill templates by copying embedded .tmpl to .plan-bender/templates/ and editing Go template syntax
  - id: UC-6
    description: User runs `pb status` and sees a styled dashboard via Bubbletea/Lipgloss instead of plain consola output

decisions:
  - "CLI framework: Cobra (industry standard, matches gh/kubectl/docker patterns)"
  - "Template engine: Go text/template — rewrite all .skill.tmpl files rather than porting the custom parser"
  - "Validation: go-playground/validator struct tags for schema rules + hand-written functions for cross-refs and cycle detection (Kahn's algorithm)"
  - "Config: Viper for 3-layer loading and merging (global ~/.config/plan-bender/defaults.yaml, project .plan-bender.yaml, local .plan-bender.local.yaml)"
  - "Config files renamed: plan-bender.yaml -> .plan-bender.yaml, plan-bender.local.yaml -> .plan-bender.local.yaml (dot-prefix for cleaner repo roots)"
  - "Linear API: raw GraphQL over net/http — no SDK dependency"
  - "YAML: go-yaml v3 with struct tags"
  - "Error handling: idiomatic Go (val, error) multi-return with custom DomainError type supporting errors.Is/As"
  - "CLI UX: Bubbletea + Lipgloss for interactive prompts, styled tables, and dashboard output"
  - "Backend pattern: Go interface type with factory function selecting by config"
  - "Testing: stdlib testing + testify assertions"
  - "Bundled templates: embed.FS directive"
  - "Distribution: goreleaser with GitHub Releases + Homebrew tap (jasonraimondi/homebrew-tap)"
  - "Project layout: cmd/plan-bender/main.go + internal/ packages (cli, config, schema, backend, template, engine)"
  - "Module path: github.com/jasonraimondi/plan-bender"
  - "Go version: 1.24"
  - "Binary names: plan-bender + pb (same as current)"
  - "New repo — archive TS repo when Go version is feature-complete"
  - "Atomic writes preserved: os.CreateTemp + os.Rename"
  - "Go version managed via mise (.mise.toml pinning Go 1.24) — contributors run `mise install` instead of managing Go manually"

open_questions:
  - "Should Viper watch for config file changes or just load once at startup?"
  - "Should the Go version support shell completions out of the box via Cobra's built-in completion command?"
  - "How should the Linear GraphQL schema be kept up to date — vendored .graphql files or inline query strings?"

risks:
  - "Go text/template is less expressive than the custom engine — some template constructs may need workarounds (e.g., pipe chaining, indent behavior)"
  - "Bubbletea's TUI model differs significantly from consola's simple prompt API — the init command's interactive flow will need careful reimplementation"
  - "Raw GraphQL for Linear means manually maintaining queries as Linear's API evolves"
  - "Viper's deep merge behavior may differ subtly from the custom deepMerge in the TS version — needs careful testing of array-replacement semantics"

validation:
  - "All 10 CLI commands produce identical behavior to the TypeScript version"
  - "Existing plans/ directories with PRD and issue YAML files are read and validated correctly by the Go binary"
  - "Generated SKILL.md files from Go templates match the output of the TypeScript template engine for default templates"
  - "goreleaser produces working binaries for all 5 target platform/arch combinations"
  - "Homebrew tap installs and runs correctly on macOS"
  - "Linear sync (push and pull) produces the same YAML mutations as the TypeScript version"
  - "Config merging of 3 layers produces identical resolved config for test fixtures"

notes: |
  ## Package Structure

  ```
  github.com/jasonraimondi/plan-bender/
  +-- cmd/plan-bender/main.go         # Cobra root command, subcommand registration
  +-- internal/
  |   +-- cli/                        # Cobra command implementations (one file per command)
  |   +-- config/                     # Viper-based 3-layer loading, schema, defaults, validation
  |   +-- schema/                     # PRD + issue struct definitions, validator tags, cross-ref + cycle checks
  |   +-- backend/                    # TrackingBackend interface, yaml-fs impl, linear impl, factory
  |   +-- template/                   # Template loader (embed.FS + local overrides), context builder
  |   +-- engine/                     # Go text/template rendering with custom FuncMap (upper, lower, kebab, join, indent)
  +-- templates/                      # Embedded .tmpl files (8 skill templates)
  +-- .goreleaser.yaml
  +-- go.mod
  +-- go.sum
  +-- .mise.toml                      # Pins Go 1.24 for contributors
  ```

  ## Key Type Mappings (TS -> Go)

  - Result<T, E> -> (T, error) multi-return
  - DomainError extends Error -> DomainError struct implementing error interface + errors.Is/As
  - Zod schemas -> Go structs with validator tags + custom validation functions
  - TrackingBackend interface -> Go interface with context.Context on all methods
  - Template AST nodes -> Go text/template (no custom AST needed)
  - Config deepMerge -> Viper's built-in merge (verify array-replacement semantics match)

  ## Template FuncMap

  Custom functions registered on text/template to replicate pipe behavior:
  - upper: strings.ToUpper
  - lower: strings.ToLower
  - kebab: custom kebab-case converter
  - join: strings.Join with configurable separator
  - indent: prefix each line with N spaces
  - default: provide fallback value (Go template built-in)

  ## Config File Rename

  The Go version renames config files to use dot-prefix:
  - plan-bender.yaml -> .plan-bender.yaml
  - plan-bender.local.yaml -> .plan-bender.local.yaml
  - ~/.config/plan-bender/defaults.yaml stays unchanged (already in a config directory)
