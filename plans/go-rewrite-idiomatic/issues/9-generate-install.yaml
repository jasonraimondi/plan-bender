  - "internal/cli/install.go — Cobra command: resolve target dir (project or user), create symlinks, manage .gitignore entries"
  - "internal/cli/generate_test.go — verify rendered skills written to correct paths with expected content"
  - "internal/cli/install_test.go — verify symlink creation, existing symlink replacement, gitignore updates"

