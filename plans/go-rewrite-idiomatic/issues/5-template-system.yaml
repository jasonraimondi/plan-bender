outcome: |
  Template loading, rendering, and override system using Go text/template with embedded defaults.

scope: |
  embed.FS loader, text/template rendering, FuncMap, local override mechanism. No template content rewrites.

acceptance_criteria:
  - "Bundled templates loaded via embed.FS"
  - "Local .plan-bender/templates/ overrides bundled templates by filename"
  - "FuncMap provides upper, lower, kebab, join, indent"
  - "Rendering produces correct output for test templates"

steps:
  - "internal/template/embed.go — embed.FS directive for templates/*.tmpl, Load() returning map[name]content"
  - "internal/template/override.go — merge local overrides from .plan-bender/templates/ over embedded"
  - "internal/template/funcmap.go — FuncMap with upper, lower, kebab, join(sep), indent(n)"
  - "internal/template/render.go — Render(name, tmplContent, context) using text/template + FuncMap"
  - "internal/template/funcmap_test.go — table-driven: each function with edge cases (empty string, zero indent, empty array join)"
  - "internal/template/render_test.go — render simple template with variables, conditionals, loops, pipes"

use_cases:
  - UC-5

notes: |
  Go text/template replaces the custom @if/@each/${var|pipe} parser. FuncMap replaces pipe system.
