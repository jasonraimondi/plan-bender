name: Plan-Bender Go Rewrite (Idiomatic)
slug: go-rewrite-idiomatic
status: active
created: 2026-03-28
updated: 2026-03-28
description: Rewrite plan-bender from TypeScript to Go as an idiomatic single-binary CLI
why: >
  The current TypeScript implementation requires Node.js >= 22 as a runtime dependency.
  Users must npm install, manage node versions, and deal with dependency resolution.
  A Go rewrite produces a single static binary — download and run, no runtime needed.
outcome: >
  A feature-complete Go CLI binary (plan-bender / pb) that passes all existing
  validation and behavioral tests, reads/writes identical YAML plan schemas, and
  ships via goreleaser to GitHub Releases + Homebrew.

in_scope:
  - All 10 CLI commands (init, generate-skills, install, validate, write-prd, write-issue, status, graph, sync, archive)
  - Both backends (yaml-fs, linear) with identical Backend interface
  - 3-layer config loading via plain go-yaml v3 + deep merge
  - Struct-level validation functions (no struct-tag validator library)
  - Cross-reference validation and cycle detection (Kahn's algorithm)
  - Template system using Go text/template with embed.FS for bundled templates
  - Template override mechanism (.plan-bender/templates/)
  - Skill generation and symlink installation
  - Atomic file writes (tmp + rename)
  - charmbracelet/huh for interactive prompts, Lipgloss for styled output
  - Bubbletea only for live-updating status dashboard (pb status)
  - goreleaser for cross-platform builds (linux/amd64, linux/arm64, darwin/amd64, darwin/arm64, windows/amd64)
  - Homebrew tap via separate jasonraimondi/homebrew-tap repo
  - Rewrite all 8 .skill.tmpl files to Go text/template syntax
  - context.Context threaded from CLI entry through backends and HTTP calls
  - slog structured logging throughout
  - fs.FS abstraction for testable file operations

out_of_scope:
  - Automated migration tool for custom .skill.tmpl files (old syntax to Go template syntax)
  - Changes to YAML plan schemas (PRD, issue formats stay identical)
  - New features beyond current TypeScript implementation
  - Plugin system or extensibility beyond template overrides
  - Web UI or API server mode

use_cases:
  - id: UC-1
    description: User installs plan-bender by downloading a single binary or via Homebrew — no Node.js required
  - id: UC-2
    description: User runs `pb init` to create .plan-bender.yaml and generate skills, same interactive flow as TS version
  - id: UC-3
    description: User validates, writes, and manages plans using identical YAML schemas — existing plans/ directories work unchanged
  - id: UC-4
    description: User syncs issues to Linear via GraphQL, same push/pull behavior as TS @linear/sdk integration
  - id: UC-5
    description: User customizes skill templates by copying embedded .tmpl to .plan-bender/templates/ and editing Go template syntax
  - id: UC-6
    description: User runs `pb status` and sees a styled dashboard via Bubbletea/Lipgloss

decisions:
  - "CLI framework: Cobra (matches gh/kubectl/docker patterns)"
  - "Template engine: Go text/template — rewrite all .skill.tmpl files rather than porting the custom parser"
  - "Config: plain go-yaml v3 with a ~30-line deepMerge — no Viper. Three YAML files don't need a framework. Simpler, no global state, fully debuggable."
  - "Config files renamed: plan-bender.yaml -> .plan-bender.yaml, plan-bender.local.yaml -> .plan-bender.local.yaml (dot-prefix for cleaner repo roots)"
  - "Validation: hand-written validation functions per struct, no go-playground/validator. Most validation is custom (cross-refs, cycles, conditional fields) so struct tags add complexity without covering the hard cases."
  - "Error handling: per-package error types + sentinel errors, not a universal DomainError. ValidationError, ConfigError, SyncError etc. with fmt.Errorf %w wrapping for context. errors.Is/As work naturally across packages."
  - "Interactive prompts: charmbracelet/huh for forms (init, write-prd, write-issue). Bubbletea reserved for live-updating status dashboard only."
  - "File I/O: fs.FS injected for reads, WriteFunc for writes. Production uses os.DirFS + atomic rename. Tests use fstest.MapFS + in-memory writes."
  - "Backend selection: simple factory switch, not a registry. Two backends don't justify init()-based registration."
  - "Linear API: Khan/genqlient for type-safe GraphQL client generation from vendored schema, avoiding hand-rolled query strings that rot as the API evolves"
  - "YAML: go-yaml v3 with struct tags"
  - "Logging: slog (stdlib) for structured logging"
  - "Testing: stdlib testing + testify assertions + table-driven tests"
  - "Bundled templates: embed.FS directive"
  - "Distribution: goreleaser with GitHub Releases + Homebrew tap (jasonraimondi/homebrew-tap)"
  - "Module path: github.com/jasonraimondi/plan-bender"
  - "Go version: 1.24"
  - "Binary: single cmd/plan-bender/main.go, goreleaser produces both plan-bender and pb names"
  - "New repo — archive TS repo when Go version is feature-complete"
  - "Go version managed via mise (.mise.toml pinning Go 1.24)"

open_questions:
  - "Should the Go version support shell completions out of the box via Cobra's built-in completion command?"
  - "How should the Linear GraphQL schema be vendored — check in generated code or regenerate on CI?"
  - "Should pb status be a static snapshot (run once, print, exit) or a live Bubbletea TUI?"

risks:
  - "Go text/template is less expressive than the custom engine — some template constructs may need workarounds (e.g., pipe chaining, indent behavior)"
  - "charmbracelet/huh is younger than Bubbletea — may hit edge cases in complex multi-step forms like pb init"
  - "Khan/genqlient adds a codegen step to the build — needs clear contributor docs"
  - "Deep merge of YAML configs must match TS behavior exactly — arrays replace (not append), objects merge recursively. Needs thorough test fixtures."

validation:
  - "All 10 CLI commands produce identical behavior to the TypeScript version"
  - "Existing plans/ directories with PRD and issue YAML files are read and validated correctly by the Go binary"
  - "Generated SKILL.md files from Go templates match the output of the TypeScript template engine for default templates"
  - "goreleaser produces working binaries for all 5 target platform/arch combinations"
  - "Homebrew tap installs and runs correctly on macOS"
  - "Linear sync (push and pull) produces the same YAML mutations as the TypeScript version"
  - "Config merging of 3 layers produces identical resolved config for test fixtures"
  - "All file operations work with injected fs.FS in tests (no disk I/O in unit tests)"

notes: |
  ## Package Structure

  ```
  github.com/jasonraimondi/plan-bender/
  +-- cmd/plan-bender/main.go         # Cobra root command, subcommand registration
  +-- internal/
  |   +-- cli/                        # Cobra command implementations (one file per command)
  |   +-- config/                     # YAML-based 3-layer loading, deep merge, validation
  |   +-- schema/                     # PRD + issue struct definitions, validation funcs, cross-ref + cycle checks
  |   +-- backend/                    # Backend interface, yaml-fs impl, linear impl, factory switch
  |   +-- template/                   # Template loader (embed.FS + local overrides), FuncMap, rendering
  |   +-- linear/                     # genqlient client, vendored schema, query definitions
  +-- templates/                      # Embedded .tmpl files (8 skill templates)
  +-- .goreleaser.yaml
  +-- go.mod
  +-- go.sum
  +-- .mise.toml                      # Pins Go 1.24 for contributors
  ```

  Compared to original PRD: `internal/engine/` merged into `internal/template/` (one concern,
  one package). `internal/linear/` extracted from backend for genqlient-generated code.

  ## Key Type Mappings (TS -> Go)

  - Result<T, E> -> (T, error) multi-return
  - DomainError extends Error -> per-package error types (ConfigError, ValidationError, SyncError)
  - Zod schemas -> Go structs + hand-written Validate() methods
  - TrackingBackend interface -> Go interface with context.Context on all methods
  - Template AST nodes -> Go text/template (no custom AST needed)
  - Config deepMerge -> hand-written ~30-line recursive merge (arrays replace, objects merge)
  - Zod superRefine -> validation functions returning []ValidationError

  ## Error Strategy

  Each package defines its own error types:

  - config: ConfigError (wraps parse/merge/validation failures)
  - schema: ValidationError { Field, Message string } — collected as []ValidationError
  - backend: SyncError, NotFoundError
  - linear: APIError (wraps HTTP status + response body)

  Sentinel errors for common conditions:
  - ErrNotFound, ErrCycleDetected, ErrInvalidConfig

  All errors support unwrapping via fmt.Errorf("context: %w", err).
  CLI layer maps errors to exit codes and styled output.

  ## Config Loading (no Viper)

  ```go
  func Load(root string) (Config, error) {
      base := defaults()
      paths := []string{
          globalPath(),                          // ~/.config/plan-bender/defaults.yaml
          filepath.Join(root, ".plan-bender.yaml"),   // project
          filepath.Join(root, ".plan-bender.local.yaml"), // local overrides
      }
      for _, p := range paths {
          layer, err := readYAML[PartialConfig](p)
          if errors.Is(err, fs.ErrNotExist) { continue }
          if err != nil { return Config{}, fmt.Errorf("loading %s: %w", p, err) }
          merge(&base, layer)
      }
      return validate(base)
  }
  ```

  merge() is recursive: maps merge keys, slices replace entirely, scalars overwrite.

  ## File I/O Abstraction

  ```go
  // For reads — inject fs.FS
  type PlanStore struct {
      fsys  fs.FS
      write func(path string, data []byte, perm fs.FileMode) error
  }

  // Production
  store := PlanStore{
      fsys:  os.DirFS(root),
      write: atomicWrite, // os.CreateTemp + os.Rename
  }

  // Tests
  store := PlanStore{
      fsys:  fstest.MapFS{"plans/foo/prd.yaml": &fstest.MapFile{Data: prdBytes}},
      write: func(path string, data []byte, _ fs.FileMode) error { written[path] = data; return nil },
  }
  ```

  ## Template FuncMap

  Custom functions registered on text/template:
  - upper: strings.ToUpper
  - lower: strings.ToLower
  - kebab: custom kebab-case converter
  - join: strings.Join with configurable separator
  - indent: prefix each line with N spaces
  - default: Go template built-in

  ## Backend Factory (no registry)

  ```go
  func New(ctx context.Context, cfg config.Config) (Backend, error) {
      switch cfg.Backend {
      case "yaml-fs":
          return newYAMLFS(cfg)
      case "linear":
          return newLinear(ctx, cfg)
      default:
          return nil, fmt.Errorf("unknown backend: %q", cfg.Backend)
      }
  }
  ```

  ## Config File Rename

  The Go version renames config files to use dot-prefix:
  - plan-bender.yaml -> .plan-bender.yaml
  - plan-bender.local.yaml -> .plan-bender.local.yaml
  - ~/.config/plan-bender/defaults.yaml stays unchanged (already in a config directory)
