outcome: |
  The self-update command's direct-binary path is fully functional: downloads, verifies,
  replaces the binary and symlink in-place, and handles permission failures gracefully.

scope: |
  Atomic binary replacement, pb symlink recreation, permission error handling,
  version change reporting. Wires download module into the self-update command.

acceptance_criteria:
  - "Replaces binary at current executable path using atomic write pattern"
  - "Recreates pb symlink in same directory as the binary"
  - "On permission denied, prints suggestion to run with sudo instead of crashing"
  - "Reports version change (e.g. v0.0.8 -> v0.0.9)"

steps:
  - "internal/update/replace.go — implement ReplaceBinary(newBinaryPath, targetPath) using atomic write (temp file in same dir + os.Rename) and chmod +x"
  - "internal/update/replace.go — implement RecreateSymlink(binaryDir) creating pb symlink pointing to plan-bender"
  - "internal/cli/selfupdate.go — wire the direct-binary path: DownloadAndVerify -> ReplaceBinary -> RecreateSymlink -> print version change"
  - "internal/cli/selfupdate.go — catch os.ErrPermission and print 'sudo pb self-update' suggestion"
  - "internal/update/replace_test.go — test replacement in temp dir, symlink creation, permission error detection"

use_cases:
  - UC-2
  - UC-6

notes: |
  Use os.Executable() to find the current binary path. Resolve symlinks with filepath.EvalSymlinks.
  Atomic replacement: write to temp file in same directory, then os.Rename (atomic on same filesystem).
  The existing atomicWriteFile pattern in internal/cli/write_prd.go can be referenced.
  Permission check: errors.Is(err, os.ErrPermission) catches both direct and wrapped permission errors.
