outcome: |
  Running any pb command on a stale version shows a non-intrusive stderr notice after output,
  suppressible via env var or config. Slow networks do not delay command execution.

scope: |
  Root command PersistentPreRun/PersistentPostRun hooks, async goroutine with timeout,
  env var and config suppression, config schema addition.

acceptance_criteria:
  - "Running any command on a stale version prints notice to stderr after command output"
  - "PB_NO_UPDATE_CHECK=1 suppresses all network calls and notices"
  - "update_check: false in .plan-bender.yaml suppresses all network calls and notices"
  - "Slow or unreachable network does not delay command exit"

steps:
  - "internal/config/config.go — add UpdateCheck *bool field to Config struct, defaulting to true in Defaults()"
  - "cmd/plan-bender/main.go — in PersistentPreRun, check PB_NO_UPDATE_CHECK env var and config.UpdateCheck; if enabled, launch goroutine calling CheckForUpdate and send result to channel"
  - "cmd/plan-bender/main.go — in PersistentPostRun, select on result channel with 500ms timeout; if stale, print notice to stderr"
  - "internal/cli/selfupdate_test.go — test notice appears on stderr for stale version, suppression via env var, timeout does not block"

use_cases:
  - UC-1
  - UC-5
  - UC-7

notes: |
  Notice format: "A new version of plan-bender is available: v0.0.8 -> v0.0.9\n  Run 'pb self-update' to upgrade"
  The self-update command itself should not show the staleness notice (avoid double messaging).
  Use a buffered channel of size 1 so the goroutine never blocks.
  PersistentPreRun already exists for logging setup — chain the new logic after it.
