outcome: |
  A download module that fetches the correct platform-specific release tarball from GitHub,
  verifies its SHA256 checksum, and extracts the binary to a temp directory.

scope: |
  Platform detection, tarball download, checksums.txt fetch and parse, SHA256 verification,
  tar.gz extraction. Does not include binary replacement or command wiring.

acceptance_criteria:
  - "Downloads platform-specific tarball from GitHub release using runtime.GOOS/GOARCH"
  - "Downloads checksums.txt and verifies SHA256 of downloaded archive"
  - "Aborts with clear error on checksum mismatch"
  - "Extracts plan-bender binary from tarball to a temp directory"

steps:
  - "internal/update/download.go — implement BuildAssetURL(version) constructing the archive URL from runtime.GOOS/GOARCH with the naming convention plan-bender_{version}_{os}_{arch}.tar.gz"
  - "internal/update/download.go — implement VerifyChecksum(archivePath, checksumsBody, expectedFilename) parsing checksums.txt lines and comparing SHA256 using crypto/sha256"
  - "internal/update/download.go — implement DownloadAndVerify(version) orchestrating: download checksums.txt, download tarball, verify, extract using archive/tar + compress/gzip"
  - "internal/update/download_test.go — test checksum verification pass and mismatch, URL construction for multiple platforms, extraction of binary from test tarball"

use_cases:
  - UC-2

notes: |
  GoReleaser archive naming: plan-bender_{VERSION}_{OS}_{ARCH}.tar.gz
  OS values: linux, darwin, windows. Arch values: amd64, arm64.
  checksums.txt format: "{sha256}  {filename}" (two spaces between hash and name).
  Use os.CreateTemp for the download destination.
  HTTP client should have a reasonable timeout (~30s for large downloads).
