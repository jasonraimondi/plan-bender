outcome: |
  A reusable update package that checks GitHub for the latest release, caches the result,
  and compares semver versions. Foundation for both the self-update command and passive notice.

scope: |
  GitHub Releases API fetch, JSON cache file with TTL, semver comparison, dev-version guard.
  Does not include download, install, or UI concerns.

acceptance_criteria:
  - "Fetches latest version from GitHub Releases API and caches to $XDG_CACHE_HOME/plan-bender/latest-version.json"
  - "Returns cached result when TTL (24h) has not expired without making a network call"
  - "Compares semver correctly (current vs latest) and reports whether an update is available"
  - "Returns early with no network call when version is 'dev'"

steps:
  - "internal/update/version.go — define VersionInfo struct (version string, checked_at time) and cache read/write with JSON serialization to XDG cache dir"
  - "internal/update/version.go — implement FetchLatest() hitting GET /repos/jasonraimondi/plan-bender/releases/latest with short HTTP timeout, parsing tag_name field"
  - "internal/update/version.go — implement CheckForUpdate(currentVersion) orchestrating cache check, conditional fetch, semver compare, returning (latest string, isNewer bool, err error)"
  - "internal/update/version.go — guard all logic with early return when currentVersion == 'dev'"
  - "internal/update/version_test.go — test cache TTL expiry and reuse, semver comparison edge cases, dev-skip path, and HTTP fetch using httptest server"

use_cases:
  - UC-1
  - UC-4
  - UC-7

notes: |
  XDG_CACHE_HOME defaults to ~/.cache on Linux and ~/Library/Caches on macOS.
  Use os.UserCacheDir() from stdlib which handles both.
  HTTP timeout should be ~3s to avoid blocking on slow networks.
  Semver comparison only needs major.minor.patch — no pre-release tags expected.
