outcome: |
  A function that detects whether plan-bender was installed via npm or as a direct binary,
  so the self-update command can dispatch to the correct update path.

scope: |
  Executable path inspection only. No update logic.

acceptance_criteria:
  - "Returns 'npm' when executable path contains node_modules"
  - "Returns 'direct' otherwise"

steps:
  - "internal/update/detect.go — implement DetectInstallMethod() using os.Executable() and strings.Contains for node_modules path check"
  - "internal/update/detect_test.go — test both npm and direct detection paths using path fixtures"

use_cases:
  - UC-2
  - UC-3

notes: |
  os.Executable() returns the resolved path of the running binary.
  npm wrapper packages install to node_modules/@jasonraimondi/plan-bender-{platform}/bin/plan-bender.
  Any path containing "node_modules" is a reliable npm signal.
