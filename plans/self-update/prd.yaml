name: "Self-Update"
slug: self-update
status: complete
created: 2026-03-28
updated: 2026-03-28

description: |
  Add a `pb self-update` command and passive staleness notice so users stay on the latest version without leaving the terminal.

why: |
  plan-bender has no built-in update mechanism. Users must manually re-run install.sh or npm install to get new versions.
  There is no feedback when a newer version exists, so users can run stale builds indefinitely without knowing.
  As the tool matures and releases become more frequent, this friction will slow adoption of fixes and features.

outcome: |
  Running any pb command on a stale binary shows a non-intrusive stderr notice pointing to `pb self-update`.
  Running `pb self-update` detects the install method and either updates the binary in-place (direct install)
  or prints the correct package-manager command (npm). The update flow verifies checksums for security.

in_scope:
  - "`pb self-update` command with install-method detection (npm vs direct binary)"
  - "In-place binary replacement for direct installs with SHA256 checksum verification"
  - "Print-instructions path for npm installs"
  - "Passive staleness notice on stderr after command output"
  - "Async background version check against GitHub Releases API"
  - "File-based version cache with 24h TTL in XDG cache directory"
  - "Suppress via PB_NO_UPDATE_CHECK=1 env var or update_check config flag"
  - "Skip all update logic when version is 'dev'"
  - "Permission handling: attempt write, suggest sudo on failure"
  - "Update both plan-bender binary and pb symlink"

out_of_scope:
  - "Homebrew tap or other package manager integrations"
  - "Automatic background updates without user action"
  - "Rollback or downgrade support"
  - "Update channels (stable/beta/nightly)"
  - "Signed releases or GPG verification beyond checksums"

use_cases:
  - id: UC-1
    description: "User runs any pb command on a stale version and sees a notice suggesting self-update"
  - id: UC-2
    description: "User runs `pb self-update` with a direct binary install and the binary is replaced in-place"
  - id: UC-3
    description: "User runs `pb self-update` with an npm install and sees the correct npm upgrade command"
  - id: UC-4
    description: "User runs `pb self-update` when already on latest and sees confirmation"
  - id: UC-5
    description: "User suppresses update checks via env var or config for CI/scripting"
  - id: UC-6
    description: "User runs `pb self-update` on a binary in a root-owned directory and gets a sudo hint"
  - id: UC-7
    description: "Developer running a local 'dev' build sees no update noise"

decisions:
  - "Command name is `self-update` (not `update` or `upgrade`) to avoid ambiguity with plan updates"
  - "Version source is GitHub Releases API: GET /repos/jasonraimondi/plan-bender/releases/latest"
  - "Cache location follows XDG: $XDG_CACHE_HOME/plan-bender/latest-version.json (defaults to ~/.cache/)"
  - "Cache format is JSON with version string and checked_at timestamp"
  - "Cache TTL is 24 hours"
  - "Staleness notice prints to stderr after command output completes"
  - "Install method detection: if binary path contains node_modules -> npm, else -> direct"
  - "Direct update downloads the platform-specific tarball, verifies SHA256 against checksums.txt, extracts, and replaces"
  - "npm path prints the install command rather than modifying node_modules directly"
  - "Permission failure prints suggestion to run with sudo rather than auto-escalating"
  - "Suppress with PB_NO_UPDATE_CHECK=1 env var or update_check: false in .plan-bender.yaml"
  - "All update logic is skipped when compiled version == 'dev'"
  - "Self-update replaces both plan-bender binary and pb symlink"
  - "When already on latest, print confirmation and exit 0"

open_questions:
  - "Should the staleness notice include release notes or changelog URL?"

risks:
  - "GitHub API rate limit is 60 req/hr unauthenticated; 24h cache makes this a non-issue for normal use but could hit limits in CI matrices without PB_NO_UPDATE_CHECK"
  - "In-place binary replacement requires write permission to the install directory; users in locked-down environments may need admin help"
  - "Async check goroutine must not delay command exit if the network is slow or unreachable"

validation:
  - "pb self-update on a stale direct-install binary downloads, verifies checksum, replaces binary, and reports version change"
  - "pb self-update on an npm install prints the correct npm command without modifying files"
  - "pb self-update when already current prints 'already up to date'"
  - "Running any command with a stale cached version shows the stderr notice exactly once per invocation"
  - "PB_NO_UPDATE_CHECK=1 suppresses all network calls and notices"
  - "update_check: false in config suppresses all network calls and notices"
  - "version == 'dev' suppresses all update behavior"
  - "Checksum mismatch aborts the update with a clear error"
  - "Permission denied triggers a sudo suggestion, not a crash"
  - "Slow/unreachable network does not delay command execution"

notes: |
  Major modules:
  - internal/update/version.go — cache read/write, TTL check, GitHub API fetch, semver comparison
  - internal/update/download.go — platform detection, tarball download, checksum verification, binary replacement
  - internal/update/detect.go — install method detection (npm vs direct)
  - internal/cli/selfupdate.go — Cobra command wiring

  The staleness check hooks into the root command's PersistentPostRun. The goroutine starts in PersistentPreRun,
  and PersistentPostRun waits for completion (with a short timeout) before printing the notice.

  Checksum verification uses the checksums.txt file that GoReleaser already generates for each release.
  The archive naming convention is: plan-bender_{VERSION}_{OS}_{ARCH}.tar.gz

  Config integration: update_check is a new top-level boolean in .plan-bender.yaml, defaulting to true.

dev_command: "go run ./cmd/plan-bender"
base_url: ""
