outcome: |
  CLI arguments validated with Zod before business logic executes. Help text includes usage examples for commands that currently have minimal descriptions.

scope: |
  CLI argument validation and help text only. Does not change command behavior beyond earlier validation and better error messages.

acceptance_criteria:
  - "Missing or invalid CLI args produce Zod validation errors (not runtime crashes or undefined behavior)"
  - "sync command validates target as non-empty string, --pull as boolean"
  - "graph command help text includes usage example"
  - "archive command help text includes usage example"
  - "validate command validates slug arg as non-empty string"

steps:
  - "src/cli/commands/sync.ts — define SyncArgsSchema = z.object({ target: z.string().min(1), pull: z.boolean().default(false) }); validate args at command entry"
  - "src/cli/commands/graph.ts — define GraphArgsSchema; add description with usage example to citty command definition"
  - "src/cli/commands/archive.ts — define ArchiveArgsSchema; add description with usage example to citty command definition"
  - "src/cli/commands/validate.ts — define ValidateArgsSchema = z.object({ slug: z.string().min(1) }); validate at command entry"
  - "All commands — apply Zod .parse() on citty args object before any business logic; catch ZodError and format as user-friendly message via consola.error"

use_cases:
  - UC-3

notes: |
  Citty already provides basic arg parsing (types, defaults), but doesn't validate semantic constraints (non-empty strings, valid formats). Zod adds a second validation layer after citty parses the raw args. The Zod error formatting should match the existing consola error style.
