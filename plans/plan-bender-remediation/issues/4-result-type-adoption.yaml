outcome: |
  All file I/O and YAML parsing returns typed Result values. No silent catch-all patterns remain. Users see clear error messages when config or YAML files are malformed.

scope: |
  src/schemas/validate.ts and src/config/loader.ts error handling. Converts silent catch-all patterns to Result returns. Does not change function signatures of public APIs beyond wrapping returns in Result.

acceptance_criteria:
  - "readYamlFile returns Result<unknown, DomainError> instead of null on failure"
  - "listYamlFiles returns Result<string[], DomainError> instead of [] on failure"
  - "readYamlSafe returns Result<PartialConfig, DomainError> instead of undefined on failure"
  - "Invalid YAML produces user-visible error with file path and parse error details"
  - "No silent catch {} or catch { return fallback } patterns remain in non-test source code"

steps:
  - "src/schemas/validate.ts — readYamlFile (lines 59-65): replace try/catch returning null with Result return; wrap YAML.parse error in DomainError with file path context"
  - "src/schemas/validate.ts — listYamlFiles (lines 67-76): replace try/catch returning [] with Result return; wrap readdirSync error in DomainError"
  - "src/config/loader.ts — readYamlSafe (lines 7-14): replace try/catch returning undefined with Result return; include file path and YAML parse error in DomainError message"
  - "src/schemas/validate.ts — update validatePlan to unwrap Results: surface file read errors in validation output instead of silently skipping"
  - "Grep for remaining catch blocks in src/**/*.ts (excluding test files) — verify none silently swallow errors"

use_cases:
  - UC-2

notes: |
  The open question from the PRD (should tests auto-unwrap Results?) can be decided during implementation. Recommendation: test helpers that call .data on ok results and .error on err results, failing the test if the Result is the wrong variant.
