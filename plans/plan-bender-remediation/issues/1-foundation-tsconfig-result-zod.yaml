outcome: |
  tsc --noEmit error count drops from ~80 to only cast/validation errors (fixed in later issues). Result type and Zod are available for all subsequent phases.

scope: |
  tsconfig.json fixes, implicit any parameter fixes, Result type module, Zod dependency. Does not change any module behavior — only adds infrastructure.

acceptance_criteria:
  - "types: [node] present in tsconfig, zero TS2591 errors"
  - "noUncheckedIndexedAccess enabled in tsconfig"
  - "No implicit any parameters remain (zero TS7006 errors)"
  - "Result<T,E> type exported from src/result.ts with ok() and err() constructors"
  - "Zod is in package.json dependencies"

steps:
  - "tsconfig.json — add types: [node] to compilerOptions (fixes ~60 TS2591 'Cannot find name' errors)"
  - "tsconfig.json — enable noUncheckedIndexedAccess: true"
  - "src/backends/yaml-fs.ts, src/backends/linear.ts, src/cli/commands/*.ts, src/schemas/validate.ts — fix all implicit any parameters (~10 TS7006 errors)"
  - "src/result.ts (NEW) — implement Result<T,E> = { ok: true; data: T } | { ok: false; error: E } with ok(data) and err(error) constructors"
  - "package.json — pnpm add zod"
  - "Verify pnpm exec tsc --noEmit — remaining errors should only be unsafe casts and validation-related (fixed in issues 2-4)"

use_cases:
  - UC-1

notes: |
  The ~60 TS2591 errors all disappear just by adding types: [node]. The ~10 TS7006 implicit any errors need manual type annotations. After this issue, tsc --noEmit should only show errors from unsafe casts in config/merge.ts and config/loader.ts (fixed in issue 2) and missing Zod types (fixed in issues 2-3).
