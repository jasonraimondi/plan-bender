outcome: |
  Config types inferred from Zod schemas. No hand-written interfaces or unsafe casts in the config module. Invalid config YAML produces clear Zod error messages.

scope: |
  src/config/ module only. Replaces hand-written interfaces with Zod schemas, removes unsafe casts, adds element-type validation for arrays. Does not touch PRD/issue schemas (issue 3).

acceptance_criteria:
  - "Config, PartialConfig, CustomFieldDef, LinearConfig, PipelineConfig types inferred from Zod schemas via z.infer<>"
  - "No unsafe 'as Config' or 'as PartialConfig' casts remain in config module"
  - "Invalid config YAML produces field-level Zod error messages"
  - "Array fields (tracks, workflow_states, pipeline.skip) validate element types as strings"
  - "Existing config tests still pass"

steps:
  - "src/config/schema.ts — replace Config, PartialConfig, CustomFieldDef, LinearConfig, PipelineConfig, IssueSchemaConfig interfaces with Zod schemas (z.object); export inferred types via z.infer<typeof ConfigSchema>"
  - "src/config/validate.ts — delete manual validateConfig function and ConfigValidationError class; replace with ConfigSchema.parse() on merged config"
  - "src/config/merge.ts — remove unsafe 'as Config' cast (line 17) and 'as Record<string,unknown>' (line 12); parse merged result through Zod schema"
  - "src/config/loader.ts — remove unsafe 'as PartialConfig' cast (line 10); use PartialConfigSchema.safeParse() on YAML parse result"
  - "src/config/defaults.ts — verify DEFAULT_CONFIG satisfies Zod schema at module load"
  - "src/config/schema.ts — add z.array(z.string()) for tracks, workflow_states, pipeline.skip fields (currently validated as arrays but not element types)"

use_cases:
  - UC-2
  - UC-4

notes: |
  PartialConfig is a deep-partial version of Config. In Zod this can be done with a separate schema using .partial() and .optional() on nested objects, or a manually defined partial schema. The merge function applies structuredClone + deep merge, then the full ConfigSchema.parse() validates the merged result.
