description: |
  Full remediation of plan-bender based on comprehensive audit: fix type safety, replace silent error swallowing with Result types, migrate validation to Zod, harden the template engine, fix backend bugs, deduplicate CLI code, and close test gaps.

why: |
  The audit found ~80 TypeScript compilation errors (tsc --noEmit has never passed clean), pervasive silent error swallowing that masks config and YAML parse failures from users, a critical remote ID format mismatch between Linear and yaml-fs backends, missing field validations in schemas, logic bugs in CLI commands (NaN propagation, unescaped Mermaid output), and significant test coverage gaps (4 commands with zero tests, tautological template tests). The codebase is functional (106/106 tests pass) but fragile — users get zero feedback when things go wrong.

outcome: |
  tsc --noEmit passes clean with stricter settings (noUncheckedIndexedAccess). All error paths return typed Result values instead of silently swallowing. Schemas and config validated via Zod with inferred types (no hand-written interfaces). Template engine handles null, double negation, and invalid pipe args. Backend ID formats are consistent and Linear pagination works. CLI arguments validated with Zod. All commands have test coverage for critical paths. Each phase ships as one commit.

in_scope:
  - "Add Result<T,E> type with ok()/err() constructors in src/result.ts"
  - "Fix tsconfig: add types: [node], enable noUncheckedIndexedAccess"
  - "Fix all implicit any parameters across the codebase"
  - "Add Zod dependency; migrate config schema to Zod (replace merge.ts unsafe casts)"
  - "Migrate PRD/Issue schemas to Zod with .passthrough() for custom fields"
  - "Delete types.ts — single source of truth is Zod-inferred types"
  - "Replace all silent catch-all patterns with Result returns"
  - "Add missing validations: timestamps, labels, use_cases, booleans, array element types, linear_id non-empty, blocked_by/blocking self-refs and duplicates"
  - "Engine: null throws like undefined, fix double negation parsing, validate pipe arguments"
  - "Fix remote ID format mismatch between backends (backend-specific IDs)"
  - "Auto-register backends in factory (remove side-effect imports from CLI)"
  - "Linear backend: fix pagination in pullProject, null state handling, reverseMapState ambiguity"
  - "Extract src/cli/shared.ts (loadIssues, readInput, generateSkills)"
  - "Zod validation for CLI arguments per command"
  - "Fix NaN propagation in sync, escape issue names in graph Mermaid output, check archive destination exists"
  - "Type TemplateContext interface, fail loudly on missing bundled templates dir"
  - "Remove dead linear context field from template context"
  - "Delete dead code in cycles.ts lines 4-21, remove developer-thought-process comments"
  - "Improve help text for sync, archive, graph commands"
  - "Add tests: validate command, sync edge cases, graph escaping, archive EEXIST"
  - "Fix tautological template tests to assert actual rendered content"
  - "Add engine tests: null, NaN, 0, empty string, objects, double negation, pipe edge cases"

out_of_scope:
  - "New features or CLI commands"
  - "Linear backend description round-trip (push sends description, pull ignores it — accepted asymmetry)"
  - "Adding .idea/ to .gitignore (user preference to keep it as-is)"
  - "Init command tests (interactive prompts are hard to test, low ROI)"
  - "Snapshot tests for template rendering (may be added later)"
  - "Changing the deep merge array-replace semantics"
  - "Rewriting the template engine parser beyond the targeted fixes"

use_cases:
  - id: UC-1
    description: "Developer runs tsc --noEmit and gets zero errors. TypeScript catches mistyped config fields, missing properties on Zod-inferred types, and unchecked index access at compile time."
  - id: UC-2
    description: "User writes invalid YAML in plan-bender.yaml. Instead of silently falling back to defaults, they see a clear error: 'Failed to parse plan-bender.yaml: invalid YAML at line 5'."
  - id: UC-3
    description: "User runs plan-bender sync auth#abc (non-numeric issue ID). Instead of 'Issue #NaN not found', they see 'Invalid issue ID: must be a number'."
  - id: UC-4
    description: "User creates an issue YAML missing required timestamps or with tdd: 'yes' (string instead of boolean). Zod validation catches it with a specific field-level error message."
  - id: UC-5
    description: "User runs plan-bender graph and an issue name contains quotes. The Mermaid output correctly escapes them instead of producing invalid syntax."
  - id: UC-6
    description: "Linear backend syncs a project with 100+ issues. Pagination ensures all issues are fetched, not just the first page."
  - id: UC-7
    description: "Template engine encounters null value in context. It throws a clear TemplateError instead of silently rendering the string 'null'."

decisions:
  - "Result type lives in src/result.ts as a top-level module."
  - "Zod for both config and schema validation. Config: Zod schema replaces manual validateConfig + unsafe casts in merge.ts. Schemas: Zod replaces hand-rolled validatePrd/validateIssue."
  - "types.ts deleted — Zod-inferred types (z.infer<typeof PrdSchema>) are the single source of truth."
  - "Custom fields handled via Zod .passthrough() — strict schema for known fields, passthrough for extras, separate validation against config.custom_fields."
  - "Backend-specific IDs — each backend defines its own format. No canonical RemoteId type."
  - "Auto-register backends in factory.ts at module level. No side-effect imports needed in CLI."
  - "Template loader keeps 3-path structure (bundled + fallback + local) but throws on missing bundled dir. TemplateContext is a typed interface."
  - "Remove dead linear field from template context. Keep @if has_backend_sync conditional as-is."
  - "CLI arguments validated with Zod schemas per command."
  - "Shared CLI utilities extracted to src/cli/shared.ts."
  - "Execution is foundation-first: Result+Zod+tsconfig -> Config+Schemas -> Engine -> Backends -> CLI -> Templates+Tests. Each phase = one commit."

open_questions:
  - "Should existing tests be updated to use Result pattern (unwrap results in assertions) or should test helpers auto-unwrap?"

risks:
  - "Zod migration touches every module that imports from types.ts or calls validate functions — high blast radius. Mitigated by phased execution."
  - "noUncheckedIndexedAccess will surface new errors in code that indexes arrays or records without checking. May require more fixes than anticipated."
  - "Changing null behavior in template engine could break existing templates if any intentionally render null values. Mitigated by reviewing all .skill.tmpl files for null usage."
  - "Result type adoption is incremental — some callers will still use try/catch during transition. Must avoid mixing patterns in the same call chain."

validation:
  - "tsc --noEmit passes with zero errors."
  - "All 106+ existing tests still pass (no regressions)."
  - "New tests added for: validate command, sync NaN edge case, graph escaping, archive EEXIST, engine null/double-negation/pipe-args, template content assertions."
  - "Manual test: write invalid YAML in plan-bender.yaml, run any CLI command, verify user sees parse error (not silent fallback)."
  - "Manual test: plan-bender sync auth#abc shows 'Invalid issue ID' error."
  - "Manual test: plan-bender graph with quoted issue name produces valid Mermaid."

notes: |
  Modules affected (all of them):
  - src/result.ts (NEW) — Result type, ok(), err() constructors
  - src/config/ — Zod schema replaces manual validation and unsafe merge casts
  - src/schemas/ — Zod schemas replace hand-rolled validators and types.ts
  - src/engine/ — null handling, double negation, pipe arg validation
  - src/backends/ — ID format fix, auto-registration, Linear pagination/null-state
  - src/cli/ — shared.ts extraction, Zod arg validation, bug fixes, help text
  - src/templates/ — TemplateContext type, loader error handling, dead field removal

  Testing strategy:
  - Unit tests for Result type constructors
  - Unit tests for Zod schema validation (replaces existing hand-rolled validation tests)
  - Unit tests for engine edge cases (null, !!, pipe args, numeric values)
  - Integration tests for CLI commands (validate, sync, graph, archive error paths)
  - Existing template tests upgraded from tautological to content-asserting

  The Zod migration is the riskiest part — it changes the type signatures of every validation function and removes types.ts. The phased approach (config first, then schemas) limits blast radius per commit.

