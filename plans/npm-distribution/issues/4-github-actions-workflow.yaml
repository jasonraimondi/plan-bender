outcome: |
  Pushing a Git tag triggers GoReleaser (existing), then a separate workflow automatically
  publishes all npm packages with the matching version.

scope: |
  Rewrite publish.yml. Does not modify the existing release.yaml (GoReleaser workflow).

acceptance_criteria:
  - "publish.yml triggers on release published event (not tag push)"
  - "Sets up Node, runs npm/scripts/publish.mjs"
  - "NPM_TOKEN secret is used for authentication"
  - "Workflow succeeds independently of GoReleaser workflow"
  - "Stale pnpm check/lint/test/build steps are removed"

steps:
  - ".github/workflows/publish.yml — change trigger from push tags to release types: [published]"
  - ".github/workflows/publish.yml — remove pnpm setup, frozen-lockfile install, check, lint, test, build steps"
  - ".github/workflows/publish.yml — add step: setup Node 24 with registry-url https://registry.npmjs.org"
  - ".github/workflows/publish.yml — add step: run node npm/scripts/publish.mjs with NODE_AUTH_TOKEN and GITHUB_TOKEN env vars"
  - ".github/workflows/publish.yml — set permissions: contents read, id-token write (for npm provenance)"

use_cases:
  - UC-5

notes: |
  The publish.mjs script handles all download/extract/version/publish logic.
  The workflow just provides the environment (Node, npm auth, GitHub token for release asset download).
  GITHUB_TOKEN is needed to download release assets from the GitHub API.
