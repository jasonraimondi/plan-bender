outcome: |
  A single publish.mjs script downloads Go binaries from a GitHub Release, injects them
  into platform packages, updates all versions, and publishes all 6 npm packages.

scope: |
  The publish script and its supporting logic. Does not include the CI workflow that invokes it.

acceptance_criteria:
  - "Script reads version from GITHUB_REF_NAME or --version flag (strips leading v)"
  - "Downloads all 5 GoReleaser archives from the GitHub Release"
  - "Extracts plan-bender binary from each archive into the correct platform package bin/"
  - "Updates version in all 6 package.json files to match release version"
  - "Publishes 5 platform packages first, then root package"
  - "Validates root package JS loads correctly before publishing"
  - "Fails fast with clear error if any download or publish step fails"

steps:
  - "npm/scripts/publish.mjs — parse version from env GITHUB_REF_NAME or --version arg, strip v prefix"
  - "npm/scripts/publish.mjs — build download URLs using GoReleaser naming convention: plan-bender_{version}_{os}_{arch}.tar.gz (zip for windows)"
  - "npm/scripts/publish.mjs — download all 5 archives using fetch(), fail fast on non-200"
  - "npm/scripts/publish.mjs — extract plan-bender binary from each archive into npm/plan-bender-{platform}/bin/, chmod +x on unix binaries"
  - "npm/scripts/publish.mjs — read and update version field in all 6 package.json files, write back"
  - "npm/scripts/publish.mjs — update optionalDependencies versions in root package.json to match"
  - "npm/scripts/publish.mjs — run minimal validation: node -e requiring root package index resolves without error"
  - "npm/scripts/publish.mjs — npm publish each platform package with --access public, then root package last; skip packages that already exist (npm 403), fail fast on other errors"

use_cases:
  - UC-5

notes: |
  GoReleaser archive names from .goreleaser.yaml name_template:
  plan-bender_{version}_{os}_{arch} where os is linux/darwin/windows and arch is amd64/arm64.
  Map to npm conventions: darwin=darwin, linux=linux, windows=win32, amd64=x64, arm64=arm64.
  Use tar.gz for unix, zip for windows. Binary inside archive is named plan-bender (plan-bender.exe on windows).
  All JSDoc typed, no TypeScript.
