outcome: |
  Five platform package directories exist under npm/ with valid package.json files
  ready to receive Go binaries at publish time.

scope: |
  Package.json scaffolding only. No binaries, no publish logic, no root package.

acceptance_criteria:
  - "Each platform directory contains a package.json with correct os and cpu fields"
  - "Package names follow @jasonraimondi/plan-bender-{os}-{arch} convention"
  - "All package.json files pass npm pack --dry-run without errors"
  - "bin/ directories are gitignored within each platform package"

steps:
  - "npm/plan-bender-darwin-arm64/package.json — create with os: [darwin], cpu: [arm64], preferUnplugged: true"
  - "npm/plan-bender-darwin-x64/package.json — create with os: [darwin], cpu: [x64], preferUnplugged: true"
  - "npm/plan-bender-linux-arm64/package.json — create with os: [linux], cpu: [arm64], preferUnplugged: true"
  - "npm/plan-bender-linux-x64/package.json — create with os: [linux], cpu: [x64], preferUnplugged: true"
  - "npm/plan-bender-win32-x64/package.json — create with os: [win32], cpu: [x64], preferUnplugged: true"
  - "npm/.gitignore — ignore bin/ directories inside platform packages (binaries injected at publish time)"

use_cases:
  - UC-1

notes: |
  Follow esbuild's pattern. Each package.json should have: name, version (0.0.0 placeholder),
  description, repository, license, preferUnplugged, engines (node >=18), os, cpu.
  No bin/main/exports fields — the root package handles binary resolution.
