outcome: |
  @jasonraimondi/plan-bender is a valid npm package that resolves the correct platform
  binary, exposes plan-bender and pb CLI commands, and provides execPath/exec() for
  programmatic use. Unsupported platforms get a clear error.

scope: |
  Root package structure, binary resolution, bin scripts, exec helper, unsupported platform
  error. Does not include publishing or CI.

acceptance_criteria:
  - "package.json lists all 5 platform packages as optionalDependencies"
  - "bin/plan-bender and bin/pb resolve and spawn the correct binary"
  - "import { execPath } from '@jasonraimondi/plan-bender' returns the binary path"
  - "import { exec } from '@jasonraimondi/plan-bender' spawns binary and returns { stdout, stderr, exitCode }"
  - "On unsupported platform, require prints error listing Homebrew and GitHub Releases as alternatives"
  - "PATH fallback works when binary is installed via brew or go install"

steps:
  - "npm/plan-bender/package.json — create with bin (plan-bender, pb), main, exports, optionalDependencies for all 5 platforms"
  - "npm/plan-bender/bin/plan-bender — shell script that resolves binary via require.resolve or PATH fallback, then execs with passthrough args"
  - "npm/plan-bender/bin/pb — symlink to plan-bender bin script"
  - "npm/plan-bender/src/index.mjs — export execPath (resolves platform binary or PATH fallback) and exec(args) (spawns binary, returns promise of {stdout, stderr, exitCode})"
  - "npm/plan-bender/src/index.mjs — unsupported platform branch prints actionable error with install alternatives and exits non-zero"
  - "npm/plan-bender/src/index.mjs — platform-to-package mapping: {darwin+arm64 → darwin-arm64, darwin+x64 → darwin-x64, linux+arm64 → linux-arm64, linux+x64 → linux-x64, win32+x64 → win32-x64}"

use_cases:
  - UC-1
  - UC-2
  - UC-3
  - UC-4

notes: |
  Binary resolution order: (1) try require.resolve('@jasonraimondi/plan-bender-{os}-{arch}/bin/plan-bender'),
  (2) fall back to which('plan-bender') on PATH, (3) throw with unsupported platform error.
  The exec() function should use child_process.execFile, not spawn, for simpler stdout/stderr capture.
